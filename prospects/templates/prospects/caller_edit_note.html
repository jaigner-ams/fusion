{% extends 'prospects/base_prospects.html' %}

{% block title %}{{ title }} - AMS Fusion Prospects{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h1>{{ title }}</h1>
    <a href="{% url 'prospects:caller_edit' prospect.pk %}{{ filter_params_str }}" class="btn btn-secondary">Cancel</a>
</div>

<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card">
            <form method="post">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label">{{ form.note_text.label }}</label>
                    {{ form.note_text }}
                </div>
                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-primary">Save Changes</button>
                    <a href="{% url 'prospects:caller_edit' prospect.pk %}{{ filter_params_str }}" class="btn btn-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
